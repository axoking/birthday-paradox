<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geburtstagsparadoxon</title>
</head>
<body>
    <h1>Geburtstagsparadoxon</h1>

    <div id="people"></div>

    <div id="ratioBar">
        <div id="ratioBarFilledPart"></div>
    </div>

    <div id="texts">
        <span>
            <b>Personen: </b><span id="peopleCount"></span>
        </span>
        <span>
            <b>Versuche: </b><span id="tryCount"></span>
        </span>
        <span>
            <b>Erfolgreich: </b><span id="successCount"></span>
        </span>
        <span>
            <b>Chance: </b><span id="chance"></span>
        </span>
    </div>
    <div id="buttons">
        <span class="button" id="incPeople">+1 Person</span>
        <span class="button" id="decPeople">-1 Person</span>
        <span class="button" id="test1">1x testen</span>
        <span class="button" id="test10">10x testen</span>
        <span class="button" id="test100">100x testen</span>
        <span class="button" id="test5k">5.000x testen</span>
    </div>
</body>
</html>
